<!DOCTYPE html>
<html>

<head>
    <title>Amazon Pay Gift Cards</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>
</head>
<style>
    .gift-card {
        border: 1px white solid;
        border-radius: 20px;
        overflow: hidden;
        text-align: center;
        transition: 0.3s;
        cursor: pointer;
    }

    .gift-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .gift-card img {
        width: 100%;
        height: 250px;
        object-fit: cover;

    }

    .gift-card h3 {
        padding: 15px;
        font-size: 32px;
    }
</style>
</head>

<body>

    <div class="container mt-5">
        <h1 class="text-center mb-4"><u>
                Explore popular Amazon Pay Gift Card </u> </h1>
        <div class="row">
            <div class="col">
                <div class="gift-card">
                    <img src="moon.jpg" alt="">
                    <h3>Your Photo</h3>
                </div>
            </div>
            <div class="col">
                <div class="gift-card">
                    <img src="forest.jpg" alt="">
                    <h3>Animated</h3>
                </div>
            </div>
            <div class="col">
                <div class="gift-card">
                    <img src="web.jpeg" alt="">
                    <h3>Physical</h3>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
