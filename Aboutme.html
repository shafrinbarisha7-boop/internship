<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            background: #050511;
            color: white;
            font-family: Arial;
        }

        .about {
            display: flex;
            gap: 40px;
            padding: 50px;
            align-items: center;
        }

        .about img {
            width: 600px;
            border-radius: 20px;
        }

        .content {
            width: 500px;
        }

        .content h1 {
            font-size: 50px;
        }

        .box-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .box {
            background: #111122;
            padding: 25px;
            border-radius: 15px;
        }

        .btn {
            background: #11b7a3;
            color: white;
            padding: 18px 40px;
            border: none;
            border-radius: 10px;
            margin-top: 30px;
            width: 100%;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <section class="about">
        <img src="pic.jpeg" alt="Profile Picture">
        <div class="content">
            <h1>Professional Engineer</h1>
            <p>
                I'm a dedicated engineering student with passion for innovation
                and problem solving.
            </p>

            <div class="box-container">

                <div class="box">
                    <h2>Education</h2>
                    <p>B.S Engineering</p>
                </div>

                <div class="box">
                    <h2>Experience</h2>
                    <p>3+ Years</p>
                </div>

                <div class="box">
                    <h2>Projects</h2>
                    <p>10+ Completed</p>
                </div>

                <div class="box">
                    <h2>Awards</h2>
                    <p>5 Recognitions</p>
                </div>

            </div>

            <button class="btn">Learn More</button>

        </div>

    </section>

</body>

</html>
