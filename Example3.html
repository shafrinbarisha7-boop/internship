<!DOCTYPE html>
<html>

<head>
    <title>Account</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.bundle.min.js"></script>
    <style>
        .account-card {
            border: 1px white solid;
            padding: 10px;
            text-align: center;
            padding: 20px;
        }

        .account-card:hover {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .account-card img {
            width: 100%;
            height: 200px;
            margin-bottom: 10px;
        }

        .crd-content {
            display: flex;
            align-items: center;
        }
    </style>

</head>

<body>

    <div class="container mt-4">
        <h2>Your Account</h2>

        <div class="row g-3">

            <div class="col-md-4">
                <div class="border rounded p-3">
                    <h5>Your Orders</h5>
                    <p>Track, return, or buy again</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="border rounded p-3">
                    <h5>Login & Security</h5>
                    <p>Edit login details</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="border rounded p-3">
                    <h5>Prime</h5>
                    <p>View benefits</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="border rounded p-3">
                    <h5>Your Addresses</h5>
                    <p>Edit addresses</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="border rounded p-3">
                    <h5>Payment Options</h5>
                    <p>Add payment methods</p>
                </div>
            </div>

            <div class="col-md-4">
                <div class="border rounded p-3">
                    <h5>Contact Us</h5>
                    <p>Customer support</p>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
