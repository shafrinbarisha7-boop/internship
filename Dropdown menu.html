<!DOCTYPE html>
<html>
    <title>Dropdown Menu</title>
<head>
<style>
    body{
        background-color:lightcyan;
    }
    h1{
        text-align:center;
        color:darkcyan;
    }
    .dropdown:hover .menu{
      display:block;
    }
    .menu{
        display:none;
    } 
 </style>
 </head>
 <div class="dropdown">
    Menu
    <div class="menu">
        <p>Item1</p>
        <p>Item2</p>
        <p>Item3</p>    
    </div>
</div>
</body>
</html>
