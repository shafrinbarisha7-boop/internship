<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        body {
            background: #e06060;
            font-family: Georgia;
        }

        .contact-box {
            width: 700px;
            background: rgb(212, 161, 114);
            margin: auto;
            margin-top: 50px;
            padding: 50px;
            border-radius: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        input,
        textarea {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #161010;
            margin-bottom: 25px;
            font-size: 20px;
        }

        .row {
            display: flex;
            gap: 20px;
        }

        button {
            background: #a87b00;
            color: sandal;
            border: none;
            padding: 20px 50px;
            border-radius: 40px;
            font-size: 25px;
            display: block;
            margin: auto;
        }
    </style>
</head>

<body>

    <div class="contact-box">

        <h1>Send me a message</h1>

        <input type="text" placeholder="Enter Your Name / Company">

        <div class="row">
            <input type="email" placeholder="Enter Your Email">
            <input type="text" placeholder="Enter Phone Number">
        </div>

        <textarea rows="6" placeholder="Write Message..."></textarea>

        <button>Send Message</button>

    </div>

</body>

</html>
