<!DOCTYPE html>
<html>
<head>
    <title>Flexbox Layout</title>
<style>
    body{ 
        background-color:lightyellow;
    }
      .container{
        display:flex;
        gap:10px;
    }
    .box{
        background:gray;
        padding:20px;
    }
</style>
</head>
<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
</div>
</body>
</html>
